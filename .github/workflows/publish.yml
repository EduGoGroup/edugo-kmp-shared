name: Publish KMP Module to GitHub Packages

on:
  push:
    tags:
      - '*/v*'

permissions:
  contents: write
  packages: write

jobs:
  publish:
    name: Publish KMP Module to GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract module and version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          MODULE="${TAG%%/v*}"
          VERSION="${TAG#*/v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "module=$MODULE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publicando módulo '$MODULE' versión '$VERSION' (tag $TAG)"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Publish module to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew :${{ steps.meta.outputs.module }}:publishAllPublicationsToGitHubPackagesRepository \
            -Pversion=${{ steps.meta.outputs.version }} \
            --no-daemon --stacktrace

      - name: Update versions.properties and push to dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODULE="${{ steps.meta.outputs.module }}"
          VERSION="${{ steps.meta.outputs.version }}"
          sed -i "s/^$MODULE=.*/$MODULE=$VERSION/" versions.properties
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.properties
          git commit -m "chore(versions): $MODULE → $VERSION"
          git push origin HEAD:refs/heads/dev

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "${{ steps.meta.outputs.module }} v${{ steps.meta.outputs.version }}" \
            --notes "Publicación de \`com.edugo.kmp:${{ steps.meta.outputs.module }}:${{ steps.meta.outputs.version }}\` en GitHub Packages."
